name: ShadowStaff CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # UPDATED: Matches your project's TargetFramework
        dotnet-version: 10.0.x 

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      # This builds the whole solution
      run: dotnet build --no-restore --configuration Release

    - name: Test
      env:
        # Double underscore maps to Gemini:ApiKey in IConfiguration
        Gemini__ApiKey: ${{ secrets.GEMINI_API_KEY }}
      # UPDATED: Points directly to the test project for clarity
      run: dotnet test ShadowStaff.Tests/ShadowStaff.Tests.csproj --no-build --verbosity normal